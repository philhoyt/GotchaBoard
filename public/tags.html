<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Tags — GotchaBoard</title>
  <link rel="icon" type="image/png" href="/icon.png">

  <!-- Fonts first — prevents FOUT -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/syne@5/700.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5/400.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/dm-sans@5/500.css">

  <!-- Theme detection before CSS — prevents flash on dark mode -->
  <script>(function(){var s=localStorage.getItem('gotcha-theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',s||p);})();</script>

  <!-- Design system -->
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <!-- Tags manager layout -->
  <link rel="stylesheet" href="css/tags-manager.css">
</head>
<body>
  <div id="tags-app">
    <header id="tags-header">
      <a href="index.html" id="back-link" title="Back to board">← GotchaBoard</a>
      <h1>Manage Tags</h1>
      <button id="theme-toggle" class="primary-btn" style="font-size:16px;padding:5px 10px" title="Toggle theme" onclick="toggleTheme()">☾</button>
      <button id="new-tag-btn" class="primary-btn">+ New Tag</button>
    </header>

    <div id="tags-toolbar">
      <input type="search" id="tags-search" placeholder="Filter tags…" autocomplete="off">
      <label class="toolbar-option">
        <input type="checkbox" id="show-empty-toggle" checked>
        Show tags with 0 Gots
      </label>
      <button id="delete-unused-btn" class="danger-btn">Delete all unused tags</button>
    </div>

    <div id="tags-main">
      <!-- New tag form (inline, hidden by default) -->
      <div id="new-tag-form" style="display:none">
        <div class="tag-form-inner">
          <input type="text" id="new-tag-name" placeholder="Tag name" maxlength="100" autocomplete="off">
          <input type="color" id="new-tag-color" value="#FFE566" title="Tag color">
          <select id="new-tag-parent">
            <option value="">— No parent —</option>
          </select>
          <button id="new-tag-save" class="primary-btn">Create</button>
          <button id="new-tag-cancel" class="ghost-btn">Cancel</button>
        </div>
      </div>

      <div id="tags-list-container">
        <div id="tags-empty" style="display:none">
          <p>No tags yet. Create one to get started.</p>
        </div>
        <ul id="tags-tree"></ul>
      </div>
    </div>
  </div>

  <!-- Edit tag modal -->
  <div id="edit-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="edit-modal-title">
    <div id="edit-modal-backdrop"></div>
    <div id="edit-modal-dialog">
      <h2 id="edit-modal-title">Edit Tag</h2>
      <div class="form-row">
        <label for="edit-tag-name">Name</label>
        <input type="text" id="edit-tag-name" maxlength="100" autocomplete="off">
      </div>
      <div class="form-row">
        <label for="edit-tag-color">Color</label>
        <input type="color" id="edit-tag-color">
      </div>
      <div class="form-row">
        <label for="edit-tag-parent">Parent tag</label>
        <select id="edit-tag-parent">
          <option value="">— No parent (top-level) —</option>
        </select>
      </div>
      <div id="edit-modal-actions">
        <button id="edit-modal-cancel" class="ghost-btn">Cancel</button>
        <button id="edit-modal-save" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <!-- Merge tag modal -->
  <div id="merge-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="merge-modal-title">
    <div id="merge-modal-backdrop"></div>
    <div id="merge-modal-dialog">
      <h2 id="merge-modal-title">Merge Tag</h2>
      <p id="merge-modal-desc"></p>
      <div class="form-row">
        <label for="merge-target-select">Merge into</label>
        <select id="merge-target-select"></select>
      </div>
      <div id="merge-modal-actions">
        <button id="merge-modal-cancel" class="ghost-btn">Cancel</button>
        <button id="merge-modal-confirm" class="primary-btn">Merge</button>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/theme.js"></script>
  <script src="js/tagColor.js"></script>
  <script src="js/tags.js"></script>
</body>
</html>
