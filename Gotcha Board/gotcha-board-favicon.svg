<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Shadow -->
  <rect x="10" y="10" width="48" height="48" rx="8" ry="8" fill="#1a1a1a" />

  <!-- Main board -->
  <rect x="6" y="6" width="48" height="48" rx="8" ry="8" fill="#FFF5E6" stroke="#1a1a1a" stroke-width="3" />

  <!-- Top-left card (pink) -->
  <rect x="13" y="15" width="16" height="14" rx="2" ry="2" fill="#FFB5C2" stroke="#1a1a1a" stroke-width="2" />

  <!-- Top-right card (lavender) -->
  <rect x="33" y="13" width="16" height="16" rx="2" ry="2" fill="#C5B4E3" stroke="#1a1a1a" stroke-width="2" />

  <!-- Bottom-left card (mint) -->
  <rect x="12" y="34" width="17" height="14" rx="2" ry="2" fill="#B8E8D0" stroke="#1a1a1a" stroke-width="2" />

  <!-- Bottom-right card (yellow) -->
  <rect x="33" y="33" width="16" height="15" rx="2" ry="2" fill="#FFE5A0" stroke="#1a1a1a" stroke-width="2" />

  <!-- Pins -->
  <circle cx="21" cy="15" r="3.5" fill="#FF6B8A" stroke="#1a1a1a" stroke-width="1.5" />
  <circle cx="41" cy="13" r="3.5" fill="#9B7FD4" stroke="#1a1a1a" stroke-width="1.5" />
  <circle cx="20" cy="34" r="3.5" fill="#5DC49A" stroke="#1a1a1a" stroke-width="1.5" />
  <circle cx="41" cy="33" r="3.5" fill="#FFCC44" stroke="#1a1a1a" stroke-width="1.5" />
</svg>