name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package (Mac arm64)
        run: npx electron-builder --mac --arm64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 1

  build-mac-x64:
    runs-on: macos-13   # Intel (last x64 macOS runner)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package (Mac x64)
        run: npx electron-builder --mac --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync version from tag
        run: npm pkg set "version=$($env:GITHUB_REF_NAME -replace '^v','')"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package (Windows)
        run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Sync version from tag
        run: npm pkg set version="${GITHUB_REF_NAME#v}"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Package (Linux)
        run: npx electron-builder --linux --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error
          retention-days: 1

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip Chrome extension
        run: npm run ext:zip

      - uses: actions/upload-artifact@v4
        with:
          name: extension
          path: dist/save-to-gotcha-extension.zip
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [build-mac-arm64, build-mac-x64, build-windows, build-linux, build-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: true
          body: |
            ## Install

            | Platform | Download |
            |----------|----------|
            | Mac (Apple Silicon) | `GotchaBoard-${{ github.ref_name }}-mac-arm64.dmg` |
            | Mac (Intel) | `GotchaBoard-${{ github.ref_name }}-mac-x64.dmg` |
            | Windows | `GotchaBoard-${{ github.ref_name }}-win-x64.exe` |
            | Linux | `GotchaBoard-${{ github.ref_name }}-linux-x86_64.AppImage` |
            | Chrome Extension | `save-to-gotcha-extension.zip` |

            ### Mac — first launch
            GotchaBoard is not notarized. On first launch:
            1. Open the `.dmg` and drag GotchaBoard to Applications
            2. **Right-click** (or Control-click) the app → **Open**
            3. Click **Open** in the dialog that appears

            If "damaged and can't be opened" appears: `xattr -cr /Applications/GotchaBoard.app`

            ### Windows — first launch
            Windows SmartScreen may show a warning since the app isn't code-signed:
            1. Click **More info**
            2. Click **Run anyway**

            ### Linux
            ```bash
            chmod +x GotchaBoard-*.AppImage && ./GotchaBoard-*.AppImage
            ```

            ---
            All data is stored locally. No accounts, no cloud, no tracking.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
