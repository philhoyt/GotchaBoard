name: Build & Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build frontend
        run: npm run build

      - name: Package Electron app (Mac)
        run: npx electron-builder --mac --x64 --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build frontend
        run: npm run build

      - name: Package Electron app (Windows)
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: dist/*.exe
          retention-days: 5

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build frontend
        run: npm run build

      - name: Package Electron app (Linux)
        run: npx electron-builder --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
          retention-days: 5

  release:
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release files
        run: ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: true
          body: |
            ## Install

            | Platform | File |
            |----------|------|
            | Mac (Apple Silicon) | `GotchaBoard-${{ github.ref_name }}-mac-arm64.dmg` |
            | Mac (Intel) | `GotchaBoard-${{ github.ref_name }}-mac-x64.dmg` |
            | Windows | `GotchaBoard-${{ github.ref_name }}-win-x64.exe` |
            | Linux | `GotchaBoard-${{ github.ref_name }}-linux-x86_64.AppImage` |

            ### Mac — first launch
            GotchaBoard is not notarized. On first launch:
            1. Open the `.dmg` and drag GotchaBoard to Applications
            2. **Right-click** (or Control-click) the app → **Open**
            3. Click **Open** in the dialog that appears
            4. After the first launch, it opens normally

            If "damaged and can't be opened" appears (rare): `xattr -cr /Applications/GotchaBoard.app`

            ### Windows — first launch
            Windows SmartScreen may show a warning since the app isn't signed:
            1. Click **More info**
            2. Click **Run anyway**

            ### Linux
            ```bash
            chmod +x GotchaBoard-*.AppImage
            ./GotchaBoard-*.AppImage
            ```

            ---
            All data is stored locally. No accounts, no cloud, no tracking.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
